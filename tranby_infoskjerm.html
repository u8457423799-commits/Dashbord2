<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tranby</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#0a0d14;
  color:#e8e6e0;
  min-height:100vh;
  overflow:hidden;
}
.dash{
  display:grid;
  grid-template-rows:100px 1fr 1fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#131720;
  border:0.5px solid #1e2333;
  border-radius:12px;
  padding:0 20px;
}
.top-left{display:flex;align-items:center;gap:14px;}
.logo{height:84px;}
.top-title{font-size:40px;font-weight:600;color:#e8e6e0;letter-spacing:.01em;}
.site-badge{
  font-size:22px;
  background:#1a1f2e;
  color:#6a8fd8;
  padding:8px 24px;
  border-radius:20px;
  border:0.5px solid #2e3a5e;
  font-weight:500;
}
.top-right{display:flex;align-items:center;gap:20px;font-size:26px;color:#898781;}
.live{display:flex;align-items:center;gap:6px;}
.dot{width:16px;height:16px;border-radius:50%;background:#0ca30c;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clk{font-family:monospace;font-size:32px;color:#c3c2b7;font-weight:600;}
.refresh-badge{font-size:22px;color:#555;}

/* SUMMARY ROW */
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.scard{
  background:#131720;
  border:0.5px solid #1e2333;
  border-radius:12px;
  padding:16px 18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.scard-label{font-size:22px;color:#555;text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;font-weight:500;}
.scard-val{font-size:64px;font-weight:600;line-height:1;}
.scard-sub{font-size:24px;color:#898781;margin-top:8px;}
.bar-track{height:4px;background:#1e2333;border-radius:2px;margin-top:10px;}
.bar-fill{height:4px;border-radius:2px;transition:width 1s ease;}

/* GAUGES ROW */
.gauges{display:grid;gap:10px;}
.gcard{
  background:#131720;
  border:0.5px solid #1e2333;
  border-radius:12px;
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.gcard-title{font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.gauge-pct{font-size:56px;font-weight:600;text-align:center;margin-top:-12px;}
.gauge-sub{font-size:20px;color:#555;text-align:center;margin-top:4px;}
.gauge-nums{display:flex;justify-content:space-around;width:100%;margin-top:8px;}
.gn-item{text-align:center;}
.gn-val{font-size:28px;font-weight:600;}
.gn-lbl{font-size:18px;color:#555;margin-top:2px;}
</style>
</head>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/u8457423799-commits/Dashbord2/main/produksjon.json';

function n(v){const x=parseFloat(v);return isNaN(x)?0:x;}
function fmt(v){return Math.round(v).toLocaleString('nb-NO');}
function pct(d,p){return p>0?Math.min(999,Math.round(d/p*100)):0;}

const GROUP_META={
  'FV-SF-DV':{label:'Dagligvare',color:'#4dd44d'},
  'FV-SF-SK':{label:'Storkjøkken',color:'#6aabf7'},
  'FV-SF-Vaku':{label:'Vakuum',color:'#c084fc'},
  'FV-SF-Ind':{label:'Industri',color:'#fab219'},
  'FV-SF-Be':{label:'Beger',color:'#f472b6'},
  'HF':{label:'HF',color:'#38bdf8'},
};

function makeSVGMeter(pctVal, color){
  const r=54,cx=70,cy=68;
  const startA=-Math.PI,endA=0;
  const clamped=Math.min(100,pctVal);
  const fillEnd=startA+(endA-startA)*(clamped/100);
  const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
  const x2=cx+r*Math.cos(fillEnd),y2=cy+r*Math.sin(fillEnd);
  const lg=(fillEnd-startA)>Math.PI?1:0;
  return `<svg viewBox="0 0 140 80" width="140" height="80">
    <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#1e2333" stroke-width="12" stroke-linecap="round"/>
    ${pctVal>0?`<path d="M${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>`:''}<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(fillEnd)}" y2="${cy+r*Math.sin(fillEnd)}" stroke="#e8e6e0" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#e8e6e0"/>
  </svg>`;
}

function renderSummary(data){
  const totPlan=data.reduce((s,r)=>s+n(r.QTY_scheduled),0);
  const totDone=data.reduce((s,r)=>s+n(r.QTY_good),0);
  const totRemain=data.reduce((s,r)=>s+n(r.QTY_remaining),0);
  const doneOrders=data.filter(r=>n(r.QTY_remaining)===0&&n(r.QTY_good)>0).length;
  const totalOrders=data.length;
  const totalPct=pct(totDone,totPlan);
  const col=totalPct<30?'#e34948':totalPct<70?'#fab219':'#4dd44d';

  document.getElementById('summaryRow').innerHTML=`
    <div class="scard">
      <div class="scard-label">Plan totalt</div>
      <div class="scard-val">${fmt(totPlan)}</div>
      <div class="scard-sub">stk — BI-Tranby</div>
    </div>
    <div class="scard">
      <div class="scard-label">Ferdigmeldt</div>
      <div class="scard-val" style="color:#4dd44d;">${fmt(totDone)}</div>
      <div class="scard-sub">${totalPct}% av plan</div>
      <div class="bar-track"><div class="bar-fill" style="width:${totalPct}%;background:#4dd44d;"></div></div>
    </div>
    <div class="scard">
      <div class="scard-label">Gjenstår</div>
      <div class="scard-val" style="color:#e34948;">${fmt(totRemain)}</div>
      <div class="scard-sub">stk</div>
    </div>
    <div class="scard">
      <div class="scard-label">Ordre status</div>
      <div class="scard-val">${doneOrders}<span style="font-size:16px;color:#555;"> / ${totalOrders}</span></div>
      <div class="scard-sub">${totalOrders-doneOrders} pågår · ${doneOrders} ferdig</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(doneOrders/totalOrders*100)}%;background:#6aabf7;"></div></div>
    </div>
    <div class="scard" style="align-items:center;">
      <div class="scard-label">Seedometer totalt</div>
      <div class="scard-val" style="color:${col};">${totalPct}%</div>
      <div class="bar-track" style="width:100%;"><div class="bar-fill" style="width:${totalPct}%;background:${col};"></div></div>
    </div>`;
}

function renderGauges(data){
  const groups={};
  Object.keys(GROUP_META).forEach(k=>groups[k]={plan:0,done:0,remaining:0});
  data.forEach(r=>{
    const key=Object.keys(GROUP_META).find(k=>r.Prod_group&&r.Prod_group.startsWith(k));
    if(key){
      groups[key].plan+=n(r.QTY_scheduled);
      groups[key].done+=n(r.QTY_good);
      groups[key].remaining+=n(r.QTY_remaining);
    }
  });

  const el=document.getElementById('gaugesRow');
  el.innerHTML=Object.entries(GROUP_META).map(([key,meta])=>{
    const g=groups[key];
    const p=pct(g.done,g.plan);
    return `<div class="gcard">
      <div class="gcard-title" style="color:${meta.color};">${meta.label}</div>
      ${makeSVGMeter(p,meta.color)}
      <div class="gauge-pct" style="color:${meta.color};">${p}%</div>
      <div class="gauge-sub">${fmt(g.done)} / ${fmt(g.plan)}</div>
      <div class="gauge-nums">
        <div class="gn-item"><div class="gn-val" style="color:#4dd44d;">${fmt(g.done)}</div><div class="gn-lbl">Ferdig</div></div>
        <div class="gn-item"><div class="gn-val" style="color:#e34948;">${fmt(g.remaining)}</div><div class="gn-lbl">Gjenstår</div></div>
      </div>
    </div>`;
  }).join('');
}

async function loadData(){
  try{
    const resp=await fetch(DATA_URL+'?nocache='+Date.now(),{cache:'no-store'});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    renderSummary(data);
    renderGauges(data);
  }catch(e){console.error('Feil:',e);}
}

function tick(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clk').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
}
tick();setInterval(tick,1000);
loadData();setInterval(loadData,5*60*1000);
</script>
</body>
</html>
