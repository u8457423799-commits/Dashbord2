<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0d14;color:#e8e6e0;min-height:100vh;overflow:hidden;}
.dash{display:grid;grid-template-rows:100px 1fr 1fr 1fr;height:100vh;gap:10px;padding:10px;}

.topbar{display:flex;align-items:center;justify-content:space-between;background:#131720;border:0.5px solid #1e2333;border-radius:12px;padding:0 20px;}
.top-left{display:flex;align-items:center;gap:14px;}
.logo{height:84px;padding:6px 0;}
.top-title{font-size:40px;font-weight:600;color:#e8e6e0;}
.site-badge{font-size:22px;background:#1a1f2e;color:#6a8fd8;padding:8px 24px;border-radius:20px;border:0.5px solid #2e3a5e;font-weight:500;}
.top-right{display:flex;align-items:center;gap:20px;font-size:26px;color:#898781;}
.live{display:flex;align-items:center;gap:6px;}
.dot{width:16px;height:16px;border-radius:50%;background:#0ca30c;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clk{font-family:monospace;font-size:32px;color:#c3c2b7;font-weight:600;}

.row1{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.row3{display:grid;gap:10px;}

.scard{background:#131720;border:0.5px solid #1e2333;border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;justify-content:center;}
.scard-fv{background:#0d1a0d;border:0.5px solid #1a3a1a;}
.scard-hf{background:#0d0d1a;border:0.5px solid #1a1a3a;}
.scard-label{font-size:22px;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;font-weight:500;}
.scard-label-fv{color:#2a6016;}
.scard-label-hf{color:#1a3a8a;}
.scard-val{font-size:56px;font-weight:600;line-height:1;}
.scard-sub{font-size:22px;color:#898781;margin-top:6px;}
.bar-track{height:5px;background:#1e2333;border-radius:3px;margin-top:10px;}
.bar-fill{height:5px;border-radius:3px;transition:width 1s ease;}

.card{background:#131720;border:0.5px solid #1e2333;border-radius:12px;padding:14px 16px;}
.card-title{font-size:14px;font-weight:500;color:#898781;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

.gcard{background:#131720;border:0.5px solid #1e2333;border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;align-items:center;}
.gcard-title{font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.gauge-pct{font-size:52px;font-weight:600;text-align:center;margin-top:-10px;}
.gauge-sub{font-size:18px;color:#555;text-align:center;margin-top:2px;}
.gauge-nums{display:flex;justify-content:space-around;width:100%;margin-top:6px;}
.gn-item{text-align:center;}
.gn-val{font-size:26px;font-weight:600;}
.gn-lbl{font-size:16px;color:#555;margin-top:2px;}
</style>
</head>
<body>
<div class="dash">
  <div class="topbar">
    <div class="top-left">
      <div class="top-title">Dashboard</div>
      </div>
    <div class="top-right">
      <div class="live"><div class="dot"></div>Live</div>
      <div id="clk">--:--:--</div>
    </div>
  </div>

  <div class="row1" id="row1"></div>
  <div class="row2" id="row2"></div>
  <div class="row3" id="row3"></div>
</div>

<script>
const DATA_URL='https://raw.githubusercontent.com/u8457423799-commits/Dashbord2/main/produksjon2.json';

function n(v){const x=parseFloat(v);return isNaN(x)?0:x;}
function fmt(v){return Math.round(v).toLocaleString('nb-NO');}
function fmtDec(v){return parseFloat(v).toLocaleString('nb-NO',{minimumFractionDigits:0,maximumFractionDigits:1});}
function pct(d,p){return p>0?Math.min(999,Math.round(d/p*100)):0;}

const FV_GRUPPER=['Dagligvare','Storkjøkken','Beger','Industri','Vakuum'];
const HF_GRUPPER=['HF Trim','HF Kuttetorg'];
function isFV(r){return FV_GRUPPER.includes(r.Prod_group);}
function isHF(r){return HF_GRUPPER.includes(r.Prod_group);}

// Samme GROUP_META som baljer_dashboard
const GROUP_META={
  'Dagligvare':{label:'Dagligvare',color:'#4dd44d'},
  'Storkjøkken':{label:'Storkjøkken',color:'#6aabf7'},
  'Beger':{label:'Beger',color:'#f472b6'},
  'HF Trim':{label:'HF Trim',color:'#38bdf8'},
  'HF Kuttetorg':{label:'HF Kuttetorg',color:'#a78bfa'},
};

function makeSVGMeter(pctVal,color){
  const r=54,cx=70,cy=68;
  const startA=-Math.PI,endA=0;
  const clamped=Math.min(100,pctVal);
  const fillEnd=startA+(endA-startA)*(clamped/100);
  const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
  const x2=cx+r*Math.cos(fillEnd),y2=cy+r*Math.sin(fillEnd);
  const lg=(fillEnd-startA)>Math.PI?1:0;
  return `<svg viewBox="0 0 140 80" width="100%" height="80">
    <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#1e2333" stroke-width="12" stroke-linecap="round"/>
    ${pctVal>0?`<path d="M${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>`:''}<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(fillEnd)}" y2="${cy+r*Math.sin(fillEnd)}" stroke="#e8e6e0" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#e8e6e0"/>
  </svg>`;
}

function calcETA(plan, done) {
  const now = new Date();
  const nowDec = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const startDec = 6;
  const taktBehov = Math.round(plan / 16);
  const gjenstaar = Math.max(0, plan - done);

  if(done >= plan) return {eta:'Est. ferdig', status:'Ferdig', taktNa:0, taktBehov, gjenstaar:0};
  if(done <= 0 || nowDec <= startDec) return {eta:'', status:'Ikke startet', taktNa:0, taktBehov, gjenstaar};

  const elapsed = nowDec - startDec;
  const taktNa = elapsed > 0 ? Math.round(done / elapsed) : 0;
  let eta = '', status = 'På plan';

  if(taktNa > 0) {
    const timerGjenstaar = gjenstaar / taktNa;
    const etaDec = nowDec + timerGjenstaar;
    const etaH = Math.floor(etaDec) % 24;
    const etaM = Math.round((etaDec - Math.floor(etaDec)) * 60);
    const etaStr = String(etaH).padStart(2,'0') + ':' + String(etaM).padStart(2,'0');
    const iDag = etaDec < 24;
    eta = 'Est. ferdig ' + etaStr + (iDag ? ' i dag' : ' i morgen');
    const diff = taktNa - taktBehov;
    if(Math.abs(diff) <= 300) status = 'På plan';
    else if(diff < -300) status = 'Bak plan';
    else status = 'Foran plan';
  }
  return {eta, status, taktNa, taktBehov, gjenstaar};
}

function statusCol(s){
  return s==='Foran plan'?'#4dd44d':s==='Bak plan'?'#e34948':'#fab219';
}

function renderAll(data){
  // FV
  const fvData=data.filter(isFV);
  const fvPlan=fvData.reduce((s,r)=>s+n(r.QTY_scheduled),0);
  const fvDone=fvData.reduce((s,r)=>s+n(r.QTY_good),0);
  const fvRemain=fvData.reduce((s,r)=>s+n(r.QTY_remaining),0);
  const fvPct=pct(fvDone,fvPlan);
  const fvCol=fvPct<30?'#e34948':fvPct<70?'#fab219':'#4dd44d';

  // HF
  const hfData=data.filter(isHF);
  const hfPlan=hfData.reduce((s,r)=>s+n(r.QTY_scheduled),0);
  const hfDone=hfData.reduce((s,r)=>s+n(r.QTY_good),0);
  const hfRemain=hfData.reduce((s,r)=>s+n(r.QTY_remaining),0);
  const hfPct=pct(hfDone,hfPlan);
  const hfCol=hfPct<30?'#e34948':hfPct<70?'#fab219':'#4dd44d';

  // Totalt
  const totPlan=fvPlan+hfPlan;
  const totDone=fvDone+hfDone;
  const totalPct=pct(totDone,totPlan);
  const totCol=totalPct<30?'#e34948':totalPct<70?'#fab219':'#4dd44d';
  const doneOrders=data.filter(r=>n(r.QTY_remaining)===0&&n(r.QTY_good)>0).length;
  const totalOrders=data.length;

  // ETA for DV + SK
  const dvSkPlan=(data.filter(r=>r.Prod_group==='Dagligvare'||r.Prod_group==='Storkjøkken')).reduce((s,r)=>s+n(r.QTY_scheduled),0);
  const dvSkDone=(data.filter(r=>r.Prod_group==='Dagligvare'||r.Prod_group==='Storkjøkken')).reduce((s,r)=>s+n(r.QTY_good),0);
  const eta=calcETA(dvSkPlan,dvSkDone);
  const sCol=statusCol(eta.status);

  // RAD 1: FV og HF
  document.getElementById('row1').innerHTML=`
    <div class="scard scard-fv">
      <div class="scard-label scard-label-fv">Plan totalt FV</div>
      <div class="scard-val">${fmt(fvPlan)}</div>
      <div class="scard-sub">stk</div>
    </div>
    <div class="scard scard-fv">
      <div class="scard-label scard-label-fv">Ferdigmeldt FV</div>
      <div class="scard-val" style="color:#4dd44d;">${fmt(fvDone)}</div>
      <div class="scard-sub">${fvPct}% av plan</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(fvPct,100)}%;background:${fvCol};"></div></div>
    </div>
    <div class="scard scard-fv">
      <div class="scard-label scard-label-fv">Gjenstår FV</div>
      <div class="scard-val" style="color:#e34948;">${fmt(fvRemain)}</div>
      <div class="scard-sub">stk</div>
    </div>
    <div class="scard scard-hf">
      <div class="scard-label scard-label-hf">Plan totalt HF</div>
      <div class="scard-val">${fmt(hfPlan)}</div>
      <div class="scard-sub">kg</div>
    </div>
    <div class="scard scard-hf">
      <div class="scard-label scard-label-hf">Ferdigmeldt HF</div>
      <div class="scard-val" style="color:#4dd44d;">${fmt(hfDone)}</div>
      <div class="scard-sub">${hfPct}% av plan</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(hfPct,100)}%;background:${hfCol};"></div></div>
    </div>
    <div class="scard scard-hf">
      <div class="scard-label scard-label-hf">Gjenstår HF</div>
      <div class="scard-val" style="color:#e34948;">${fmt(hfRemain)}</div>
      <div class="scard-sub">kg</div>
    </div>`;

  // RAD 2: Ordre status + ETA-boks
  document.getElementById('row2').innerHTML=`
    <div class="scard">
      <div class="scard-label">Ordre status</div>
      <div class="scard-val">${doneOrders}<span style="font-size:32px;color:#555;"> / ${totalOrders}</span></div>
      <div class="scard-sub">${totalOrders-doneOrders} pågår · ${doneOrders} ferdig</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(doneOrders/Math.max(totalOrders,1)*100)}%;background:#6aabf7;"></div></div>
    </div>
    <div class="card" style="justify-content:center;">
      <div class="card-title" style="color:#e8e6e0;font-size:20px;">Ferdigvare (DV + SK)</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid #252830;">
        <div>
          <div style="font-size:16px;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;">Plan totalt</div>
          <div style="font-size:36px;font-weight:600;color:#e8e6e0;">${fmt(dvSkPlan)} <span style="font-size:18px;color:#898781;">stk</span></div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:16px;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;">Gjenstår</div>
          <div style="font-size:36px;font-weight:600;color:#e34948;">${fmt(eta.gjenstaar)} <span style="font-size:18px;color:#898781;">stk</span></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="font-size:22px;color:#6aabf7;font-weight:600;">${eta.eta||'Ikke startet'}</div>
        <div style="display:flex;justify-content:space-between;font-size:20px;border-top:0.5px solid #252830;padding-top:10px;">
          <span style="color:#898781;">Status</span>
          <span style="color:${sCol};font-weight:600;">${eta.status}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:20px;">
          <span style="color:#898781;">Takt/time nå</span>
          <span style="color:#e8e6e0;font-weight:600;">${fmt(eta.taktNa)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:20px;">
          <span style="color:#898781;">Behov takt/time</span>
          <span style="color:#e8e6e0;font-weight:600;">${fmt(eta.taktBehov)}</span>
        </div>
      </div>
    </div>`;

  // RAD 3: Speedometre
  const groups={};
  Object.keys(GROUP_META).forEach(k=>groups[k]={plan:0,done:0,remaining:0});
  data.forEach(r=>{
    const key=r.Prod_group;
    if(groups[key]){
      groups[key].plan+=n(r.QTY_scheduled);
      groups[key].done+=n(r.QTY_good);
      groups[key].remaining+=n(r.QTY_remaining);
    }
  });

  const row3=document.getElementById('row3');
  row3.style.gridTemplateColumns=`repeat(${Object.keys(GROUP_META).length},1fr)`;
  row3.innerHTML=Object.entries(GROUP_META).map(([key,meta])=>{
    const g=groups[key];
    const p=pct(g.done,g.plan);
    const unit=key.startsWith('HF')?'kg':'stk';
    const f=key.startsWith('HF')?fmt:fmtDec;
    return `<div class="gcard">
      <div class="gcard-title" style="color:${meta.color};">${meta.label}</div>
      ${makeSVGMeter(p,meta.color)}
      <div class="gauge-pct" style="color:${meta.color};">${p}%</div>
      <div class="gauge-sub">${f(g.done)} / ${f(g.plan)} ${unit}</div>
      <div class="gauge-nums">
        <div class="gn-item"><div class="gn-val" style="color:#4dd44d;">${f(g.done)}</div><div class="gn-lbl">Ferdig</div></div>
        <div class="gn-item"><div class="gn-val" style="color:#e34948;">${f(g.remaining)}</div><div class="gn-lbl">Gjenstår</div></div>
      </div>
    </div>`;
  }).join('');
}

async function loadData(){
  try{
    const resp=await fetch(DATA_URL+'?nocache='+Date.now(),{cache:'no-store'});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    renderAll(data);
  }catch(e){console.error('Feil:',e);}
}

function tick(){
  const now=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clk').textContent=p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
}
tick();setInterval(tick,1000);
loadData();setInterval(loadData,5*60*1000);
</script>
</body>
</html>
